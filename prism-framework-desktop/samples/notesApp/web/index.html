<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prism Notes Sample</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f4f5f7;
            --fg: #1c1f24;
            --card: #ffffff;
            --accent: #5b5bd6;
            --border: #d6d8de;
            --muted: #6b7280;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #13151a;
                --fg: #e6e7ea;
                --card: #1c1f26;
                --border: #2a2d36;
                --muted: #9aa1ad;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 24px;
            background: var(--bg);
            color: var(--fg);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        header h1 { margin: 0; font-size: 22px; }
        header .status {
            font-size: 12px;
            color: var(--muted);
        }
        .status.ok { color: #2da44e; }
        .status.err { color: #cf222e; }
        form {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        input, textarea, button {
            font: inherit;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { opacity: 0.9; }
        button.secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .notes {
            display: grid;
            gap: 12px;
        }
        .note {
            padding: 14px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .note h3 {
            margin: 0 0 6px 0;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note p {
            margin: 0;
            color: var(--muted);
            white-space: pre-wrap;
        }
        .empty { color: var(--muted); text-align: center; padding: 40px; }
    </style>
    <script src="./apiClient.js"></script>
</head>
<body>
    <header>
        <h1>Prism Notes Sample</h1>
        <div id="status" class="status">Connecting…</div>
    </header>

    <form id="new-note-form" aria-label="Add note">
        <input id="title" name="title" placeholder="Title" aria-label="Note title" required />
        <input id="body" name="body" placeholder="Body" aria-label="Note body" required />
        <button type="submit">Add note</button>
    </form>

    <div id="notes" class="notes" aria-label="Notes list">
        <div class="empty">Loading notes…</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const notesEl = document.getElementById('notes');
        const form = document.getElementById('new-note-form');
        const titleInput = document.getElementById('title');
        const bodyInput = document.getElementById('body');

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + (cls || '');
        }

        function render(notes) {
            if (!notes.length) {
                notesEl.innerHTML = '<div class="empty">No notes yet. Add one above.</div>';
                return;
            }
            notesEl.innerHTML = '';
            for (const note of notes) {
                const el = document.createElement('div');
                el.className = 'note';
                const created = new Date(note.createdAt).toLocaleString();
                el.innerHTML =
                    '<h3><span></span><button class="secondary" aria-label="Delete note">Delete</button></h3>' +
                    '<p></p>' +
                    '<div style="font-size:11px;color:var(--muted);margin-top:6px">' + created + '</div>';
                el.querySelector('h3 span').textContent = note.title;
                el.querySelector('p').textContent = note.body;
                el.querySelector('button').addEventListener('click', () => deleteNote(note.id));
                notesEl.appendChild(el);
            }
        }

        async function refresh() {
            try {
                const notes = await window.api.call('GET', '/notes');
                setStatus('Connected (' + window.api.transport + ') · ' + notes.length + ' note(s)', 'ok');
                render(notes);
            } catch (err) {
                setStatus('Error: ' + err.message, 'err');
                notesEl.innerHTML = '<div class="empty">Failed to load notes.</div>';
            }
        }

        async function deleteNote(id) {
            try {
                await window.api.call('DELETE', '/notes/:id', { id });
                await refresh();
            } catch (err) {
                setStatus('Delete failed: ' + err.message, 'err');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await window.api.call('POST', '/notes', {
                    title: titleInput.value,
                    body: bodyInput.value,
                });
                titleInput.value = '';
                bodyInput.value = '';
                await refresh();
            } catch (err) {
                setStatus('Create failed: ' + err.message, 'err');
            }
        });

        refresh();
    </script>
</body>
</html>
