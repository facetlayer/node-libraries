<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded indigo background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#4f46e5"/>

  <!-- Ticket body (left + right rectangles, gap in the middle is the perforation) -->
  <rect x="70"  y="150" width="200" height="212" rx="28" fill="#ffffff"/>
  <rect x="294" y="150" width="148" height="212" rx="28" fill="#ffffff"/>

  <!-- Perforation dots down the middle -->
  <circle cx="282" cy="178" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="206" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="234" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="262" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="290" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="318" r="5" fill="#4f46e5"/>
  <circle cx="282" cy="346" r="5" fill="#4f46e5"/>

  <!-- Content lines on the left stub -->
  <rect x="100" y="194" width="150" height="16" rx="8" fill="#c7d2fe"/>
  <rect x="100" y="226" width="120" height="16" rx="8" fill="#c7d2fe"/>
  <rect x="100" y="258" width="140" height="16" rx="8" fill="#c7d2fe"/>
  <rect x="100" y="290" width="100" height="16" rx="8" fill="#c7d2fe"/>
  <rect x="100" y="322" width="130" height="16" rx="8" fill="#c7d2fe"/>

  <!-- Number bubble on the right stub -->
  <circle cx="368" cy="256" r="54" fill="#4f46e5"/>
  <text x="368" y="278" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="64" font-weight="700" fill="#ffffff">#</text>
</svg>
